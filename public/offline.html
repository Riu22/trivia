<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivia · Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 56px; height: 56px;
      background: #e8ff47;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    button {
      padding: 10px 24px;
      background: #e8ff47;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round">
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 17h.01"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your connection to keep playing with your friends.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
